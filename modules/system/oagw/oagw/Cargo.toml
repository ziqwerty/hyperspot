[package]
name = "cf-oagw"
description = "OAGW module - discovers and routes to plugins"
version = "0.2.17"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["cyberfabric", "cyberfabric-system"]
categories = ["web-programming"]

[lib]
name = "oagw"
path = "src/lib.rs"

[features]
# FIPS-140-3: compile TLS deps with FIPS-approved cipher suites only
fips = ["modkit-http/fips"]
test-utils = ["axum/ws", "dep:async-stream", "dep:futures", "dep:tower", "dep:rustls", "tokio/net", "tokio/sync", "tokio/rt"]

[dependencies]
oagw-sdk = { path = "../oagw-sdk", package="cf-oagw-sdk", version = "0.3.0", features = ["axum"] }
modkit = { workspace = true }
modkit-auth = { workspace = true }
modkit-http = { workspace = true }
modkit-security = { workspace = true }
modkit-macros = { workspace = true }
inventory = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
http = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
bytes = { workspace = true }
arc-swap = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
gts = { workspace = true }
utoipa = { workspace = true }
types-registry-sdk = { workspace = true }
authz-resolver-sdk = { workspace = true }
tenant-resolver-sdk = { workspace = true }
credstore-sdk = { workspace = true }
# CP deps
dashmap = { workspace = true }
psl = { workspace = true }
thiserror = { workspace = true }
mime = { workspace = true }
# DP deps
form_urlencoded = "1"
pingora-memory-cache = "0.8"
futures-util = { workspace = true, features = ["sink"] }
tokio = { workspace = true, features = ["time"] }
# Pingora proxy engine
pingora-proxy = { version = "0.8", features = ["rustls"] }
pingora-core = { version = "0.8", features = ["rustls"] }
pingora-load-balancing = { version = "0.8", features = ["rustls"] }
pingora-http = { version = "0.8" }
httparse = "1"
# test-utils optional deps
async-stream = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
tower = { workspace = true, features = ["util"], optional = true }
rustls = { workspace = true, optional = true }

[dev-dependencies]
cf-oagw = { path = ".", features = ["test-utils"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "time", "net"] }
tower = { workspace = true, features = ["util"] }
hyper = { workspace = true }
hyper-util = { workspace = true }
http-body-util = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
httpmock = { workspace = true }
tokio-rustls = { workspace = true }
rustls = { workspace = true }
rustls-pki-types = { workspace = true }
rcgen = { workspace = true }
futures-util = { workspace = true }
