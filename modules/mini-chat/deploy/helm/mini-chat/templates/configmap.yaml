apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mini-chat.fullname" . }}
  labels:
    {{- include "mini-chat.labels" . | nindent 4 }}
data:
  mini-chat.yaml: |
    # Mini-Chat K8s configuration (generated by Helm)
    server:
      home_dir: "/app/data"

    database:
      servers:
        pg_mini_chat:
          engine: "postgres"
          host: "{{ .Values.postgres.host }}"
          port: {{ .Values.postgres.port }}
          user: "{{ .Values.postgres.user }}"
          password: "${DB_PASSWORD}"
          dbname: "{{ .Values.postgres.database }}"
          pool:
            max_conns: 10
            acquire_timeout: "30s"

        sqlite_settings:
          engine: "sqlite"
          params:
            WAL: "true"
            synchronous: "NORMAL"
            busy_timeout: "5000"
          pool:
            max_conns: 5
            acquire_timeout: "30s"

    logging:
      default:
        console_format: "json"
        console_level: info
      mini_chat:
        console_format: "json"
        console_level: debug
        file_level: debug
      sqlx:
        console_format: "json"
        console_level: debug
      api_gateway:
        console_format: "json"
        console_level: debug

    modules:
      api-gateway:
        config:
          bind_addr: "0.0.0.0:{{ .Values.service.port }}"
          enable_docs: true
          cors_enabled: false
          prefix_path: "/cf"
          openapi:
            title: "Mini-Chat API"
            version: "0.1.0"
            description: "Mini-Chat server"
          defaults:
            body_limit_bytes: 64000000
            rate_limit:
              rps: 1000
              burst: 200
              in_flight: 64
          auth_disabled: true

      module-orchestrator:
        config: {}

      grpc-hub:
        config:
          listen_addr: "uds:///tmp/hyperspot-grpc"

      authn-resolver:
        config:
          vendor: "hyperspot"

      authz-resolver:
        config:
          vendor: "hyperspot"

      static-authn-plugin:
        config:
          vendor: "hyperspot"
          priority: 100
          mode: accept_all
          s2s_credentials:
            - client_id: "mini-chat"
              client_secret: "mini-chat-dev-secret"

      static-authz-plugin:
        config:
          vendor: "hyperspot"
          priority: 100

      tenant-resolver:
        config:
          vendor: "hyperspot"

      single-tenant-tr-plugin:
        config: {}

      simple-user-settings:
        database:
          server: "sqlite_settings"
          file: "settings.db"
        config:
          max_field_length: 100

      static-credstore-plugin:
        config:
          secrets:
            - key: "azure-openai-key"
              value: "${AZURE_OPENAI_API_KEY}"
            - key: "vllm-local-key"
              value: "local-dev-key"

      file-parser:
        config:
          allowed_local_base_dir: /tmp

      mini-chat:
        database:
          server: "pg_mini_chat"
        config:
          client_credentials:
            client_id: "mini-chat"
            client_secret: "mini-chat-dev-secret"
          providers:
            azure_openai:
              kind: openai_responses
              storage_kind: azure
              host: "${AZURE_OPENAI_API_HOST}"
              api_path: "/openai/v1/responses"
              api_version: "2025-03-01-preview"
              auth_plugin_type: "gts.x.core.oagw.auth_plugin.v1~x.core.oagw.apikey.v1"
              auth_config:
                header: "api-key"
                prefix: ""
                secret_ref: "azure-openai-key"
            vllm_local:
              kind: vllm_responses
              storage_kind: openai
              host: "127.0.0.1"
              port: 8000
              use_http: true
              upstream_alias: "vllm-local"
              api_path: "/v1/responses"
              auth_plugin_type: "gts.x.core.oagw.auth_plugin.v1~x.core.oagw.apikey.v1"
              auth_config:
                header: "Authorization"
                prefix: "Bearer "
                secret_ref: "vllm-local-key"

      static-mini-chat-audit-plugin:
        config:
          enabled: true

      static-mini-chat-model-policy-plugin:
        config:
          vendor: "hyperspot"
          priority: 100
          model_catalog:
            - model_id: "gpt-4.1"
              provider_model_id: "gpt-4.1"
              display_name: "GPT-4.1"
              description: "Most capable model"
              version: "4.1"
              provider_id: "azure_openai"
              provider_display_name: "Azure OpenAI"
              icon: ""
              tier: Premium
              enabled: true
              system_prompt: "You are a helpful, concise assistant. Answer clearly and directly."
              multimodal_capabilities: ["VISION_INPUT"]
              context_window: 1047576
              max_output_tokens: 32768
              max_input_tokens: 1047576
              input_tokens_credit_multiplier_micro: 3000000
              output_tokens_credit_multiplier_micro: 15000000
              multiplier_display: "3x"
              estimation_budgets:
                bytes_per_token_conservative: 4
                fixed_overhead_tokens: 100
                safety_margin_pct: 10
                image_token_budget: 1000
                tool_surcharge_tokens: 500
                web_search_surcharge_tokens: 500
                code_interpreter_surcharge_tokens: 1000
                minimal_generation_floor: 50
              max_retrieved_chunks_per_turn: 5
              max_tool_calls: 10
              general_config:
                type: ""
                tier: "premium"
                available_from: "1970-01-01T00:00:00Z"
                max_file_size_mb: 25
                api_params:
                  temperature: 0.7
                  top_p: 1.0
                  frequency_penalty: 0.0
                  presence_penalty: 0.0
                  stop: []
                features:
                  streaming: true
                  function_calling: true
                  structured_output: true
                  fine_tuning: false
                  distillation: false
                  fim_completion: false
                  chat_prefix_completion: false
                input_type:
                  text: true
                  image: true
                  audio: false
                  video: false
                tool_support:
                  web_search: true
                  file_search: true
                  image_generation: false
                  code_interpreter: true
                  computer_use: false
                  mcp: false
                supported_endpoints:
                  chat_completions: true
                  responses: true
                  realtime: false
                  assistants: false
                  batch_api: false
                  fine_tuning: false
                  embeddings: false
                  videos: false
                  image_generation: false
                  image_edit: false
                  audio_speech_generation: false
                  audio_transcription: false
                  audio_translation: false
                  moderations: false
                  completions: false
                token_policy:
                  input_tokens_credit_multiplier: 3.0
                  output_tokens_credit_multiplier: 15.0
                performance:
                  response_latency_ms: 800
                  speed_tokens_per_second: 75
              preference:
                is_default: true
                sort_order: 0

            - model_id: "gpt-4.1-mini"
              provider_model_id: "gpt-4.1-mini"
              display_name: "GPT-4.1 Mini"
              description: "Fast and efficient model"
              version: "4.1"
              provider_id: "azure_openai"
              provider_display_name: "Azure OpenAI"
              icon: ""
              tier: Standard
              enabled: true
              system_prompt: "You are a helpful, concise assistant. Answer clearly and directly."
              multimodal_capabilities: ["VISION_INPUT"]
              context_window: 1047576
              max_output_tokens: 32768
              max_input_tokens: 1047576
              input_tokens_credit_multiplier_micro: 1000000
              output_tokens_credit_multiplier_micro: 3000000
              multiplier_display: "1x"
              estimation_budgets:
                bytes_per_token_conservative: 4
                fixed_overhead_tokens: 100
                safety_margin_pct: 10
                image_token_budget: 1000
                tool_surcharge_tokens: 500
                web_search_surcharge_tokens: 500
                code_interpreter_surcharge_tokens: 1000
                minimal_generation_floor: 50
              max_retrieved_chunks_per_turn: 5
              max_tool_calls: 10
              general_config:
                type: ""
                tier: "standard"
                available_from: "1970-01-01T00:00:00Z"
                max_file_size_mb: 25
                api_params:
                  temperature: 0.7
                  top_p: 1.0
                  frequency_penalty: 0.0
                  presence_penalty: 0.0
                  stop: []
                features:
                  streaming: true
                  function_calling: true
                  structured_output: true
                  fine_tuning: false
                  distillation: false
                  fim_completion: false
                  chat_prefix_completion: false
                input_type:
                  text: true
                  image: true
                  audio: false
                  video: false
                tool_support:
                  web_search: false
                  file_search: false
                  image_generation: false
                  code_interpreter: true
                  computer_use: false
                  mcp: false
                supported_endpoints:
                  chat_completions: true
                  responses: true
                  realtime: false
                  assistants: false
                  batch_api: false
                  fine_tuning: false
                  embeddings: false
                  videos: false
                  image_generation: false
                  image_edit: false
                  audio_speech_generation: false
                  audio_transcription: false
                  audio_translation: false
                  moderations: false
                  completions: false
                token_policy:
                  input_tokens_credit_multiplier: 1.0
                  output_tokens_credit_multiplier: 3.0
                performance:
                  response_latency_ms: 400
                  speed_tokens_per_second: 150
              preference:
                is_default: false
                sort_order: 1

            - model_id: "qwen3-0.6b"
              provider_model_id: "Qwen/Qwen3-0.6B"
              display_name: "Qwen3 0.6B (vLLM local)"
              description: "Local vLLM model for development"
              version: "3.0"
              provider_id: "vllm_local"
              provider_display_name: "vLLM Local"
              icon: ""
              tier: Standard
              enabled: true
              system_prompt: "You are a helpful, concise assistant. Answer clearly and directly."
              multimodal_capabilities: []
              context_window: 40960
              max_output_tokens: 4096
              max_input_tokens: 40960
              input_tokens_credit_multiplier_micro: 0
              output_tokens_credit_multiplier_micro: 0
              multiplier_display: "0x"
              estimation_budgets:
                bytes_per_token_conservative: 4
                fixed_overhead_tokens: 100
                safety_margin_pct: 10
                image_token_budget: 0
                tool_surcharge_tokens: 0
                web_search_surcharge_tokens: 0
                code_interpreter_surcharge_tokens: 0
                minimal_generation_floor: 50
              max_retrieved_chunks_per_turn: 0
              max_tool_calls: 0
              general_config:
                type: ""
                tier: "standard"
                available_from: "1970-01-01T00:00:00Z"
                max_file_size_mb: 0
                api_params:
                  temperature: 0.2
                  top_p: 1.0
                  frequency_penalty: 0.0
                  presence_penalty: 0.0
                  stop: []
                features:
                  streaming: true
                  function_calling: false
                  structured_output: false
                  fine_tuning: false
                  distillation: false
                  fim_completion: false
                  chat_prefix_completion: false
                input_type:
                  text: true
                  image: false
                  audio: false
                  video: false
                tool_support:
                  web_search: false
                  file_search: false
                  image_generation: false
                  code_interpreter: false
                  computer_use: false
                  mcp: false
                supported_endpoints:
                  chat_completions: true
                  responses: true
                  realtime: false
                  assistants: false
                  batch_api: false
                  fine_tuning: false
                  embeddings: false
                  videos: false
                  image_generation: false
                  image_edit: false
                  audio_speech_generation: false
                  audio_transcription: false
                  audio_translation: false
                  moderations: false
                  completions: false
                token_policy:
                  input_tokens_credit_multiplier: 0.0
                  output_tokens_credit_multiplier: 0.0
                performance:
                  response_latency_ms: 200
                  speed_tokens_per_second: 200
              preference:
                is_default: false
                sort_order: 2

      oagw:
        config:
          proxy_timeout_secs: 60
          allow_http_upstream: true

    opentelemetry:
      tracing:
        enabled: false
      metrics:
        enabled: false
